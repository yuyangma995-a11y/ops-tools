name: Build Windows exe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.0.0)'
        required: true
        default: 'v2.0.0'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Install pkg
        run: npm install -g @yao-pkg/pkg

      - name: Build Windows exe
        shell: bash
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          mkdir -p dist
          pkg installer.js --target node18-win-x64 --output "dist/yuziyuan-ops-installer-${VERSION}.exe" --compress GZip
          echo "exe size:"
          ls -lh dist/

      - name: Package ops-tools source zip
        shell: bash
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          cd ops-tools
          7z a -tzip "../dist/ops-tools-src.zip" . -x!*.secret -x!feishu.config.json -x!api.config.json -x!auth.whitelist.json -x!auth.machines.json
          echo "zip size:"
          ls -lh ../dist/

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: "${{ steps.get_version.outputs.VERSION }} - 渔之源运营助手"
          body: |
            ## 安装说明
            1. 下载 `yuziyuan-ops-installer-${{ steps.get_version.outputs.VERSION }}.exe`
            2. 双击运行，等待安装完成
            3. 联系管理员获取飞书登录权限

            ⚠️ 安装过程需要联网（自动从 GitHub 下载工具文件）
          files: |
            dist/yuziyuan-ops-installer-*.exe
            dist/ops-tools-src.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
